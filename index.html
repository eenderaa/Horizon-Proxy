<body>

<div id="desktop">

  <div class="desktop-icon" onclick="openBrowser()">
    <img src="https://cdn-icons-png.flaticon.com/512/1006/1006771.png" />
    <div>Browser</div>
  </div>

  <div id="browser-window" class="window" style="display:none;">

    <div class="titlebar" id="drag-bar">
      <div>Scramjet Browser</div>

      <div class="window-buttons">
        <div class="window-button minimize"></div>
        <div class="window-button maximize"></div>
        <div class="window-button close" onclick="closeBrowser()"></div>
      </div>
    </div>

    <div class="browser-toolbar">
      <input id="url-input" type="text" value="https://example.com" />
      <button onclick="goToUrl()">Go</button>
    </div>

    <iframe id="browser-frame"></iframe>

  </div>

  <div id="taskbar">
    <div id="start-button" onclick="toggleStartMenu()">
      ⊞
    </div>

    <div>BrowserOS</div>

    <div id="clock"></div>
  </div>

  <div id="start-menu">
    <h2>Applications</h2>

    <div class="app-item" onclick="openBrowser()">
      Browser
    </div>

    <div class="app-item">
      File Manager
    </div>

    <div class="app-item">
      Terminal
    </div>

    <div class="app-item">
      Settings
    </div>
  </div>

</div>

<script>
  const browserWindow = document.getElementById('browser-window')
  const browserFrame = document.getElementById('browser-frame')
  const urlInput = document.getElementById('url-input')
  const startMenu = document.getElementById('start-menu')

  function openBrowser() {
    browserWindow.style.display = 'block'
    browserFrame.src = 'https://example.com'
  }

  function closeBrowser() {
    browserWindow.style.display = 'none'
  }

  function toggleStartMenu() {
    if (startMenu.style.display === 'block') {
      startMenu.style.display = 'none'
    } else {
      startMenu.style.display = 'block'
    }
  }

  function goToUrl() {
    let url = urlInput.value.trim()

    if (!url.startsWith('http://') && !url.startsWith('https://')) {
      url = 'https://' + url
    }

    /*
      SCRAMJET INTEGRATION

      Replace this section with:

      const encoded = window.scramjet.encodeUrl(url)
      browserFrame.src = encoded

      after installing Scramjet.
    */

    browserFrame.src = url
  }

  function updateClock() {
    const now = new Date()

    document.getElementById('clock').innerText =
      now.toLocaleTimeString([], {
        hour: '2-digit',
        minute: '2-digit'
      })
  }

  setInterval(updateClock, 1000)
  updateClock()

  // Window dragging
  const dragBar = document.getElementById('drag-bar')

  let isDragging = false
  let offsetX = 0
  let offsetY = 0

  dragBar.addEventListener('mousedown', (e) => {
    isDragging = true

    offsetX = e.clientX - browserWindow.offsetLeft
    offsetY = e.clientY - browserWindow.offsetTop
  })

  document.addEventListener('mousemove', (e) => {
    if (!isDragging) return

    browserWindow.style.left = e.clientX - offsetX + 'px'
    browserWindow.style.top = e.clientY - offsetY + 'px'
  })

  document.addEventListener('mouseup', () => {
    isDragging = false
  })
</script>

     const express = require('express')

     const { createBareServer } = require('@tomphttp/bare-server-node')

     const app = express()
     const server = http.createServer(app)

     const bare = createBareServer('/bare/')

     app.use(express.static('public'))

     server.on('request', (req, res) => {
       if (bare.shouldRoute(req)) {
         bare.routeRequest(req, res)
       } else {
         app(req, res)
       }
     })

     server.listen(8080)
