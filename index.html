<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BrowserOS (Working)</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  overflow: hidden;
}

#topbar {
  height: 50px;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px;
  background: #111827;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: none;
  outline: none;
}

button {
  padding: 10px 14px;
  border: none;
  border-radius: 8px;
  background: #3b82f6;
  color: white;
  cursor: pointer;
}

iframe {
  width: 100%;
  height: calc(100vh - 50px);
  border: none;
  background: white;
}
</style>
</head>

<body>

<div id="topbar">
  <input id="url" value="https://example.com">
  <button onclick="go()">Go</button>
</div>

<iframe id="frame"></iframe>

<script>

const frame = document.getElementById("frame");
const urlInput = document.getElementById("url");

async function go() {
  let url = urlInput.value.trim();

  if (!url.startsWith("http")) {
    url = "https://" + url;
  }

  // =========================
  // SIMPLE WORKING MODE FIRST
  // =========================
  frame.src = url;
}

/*
========================================
OPTIONAL SCRAMJET SUPPORT (ADVANCED)
========================================

ONLY works if you actually run:
- Bare server backend
- Scramjet service worker

Otherwise ignore this.
*/

async function tryScramjet(url) {
  try {
    if (!window.scramjet) return null;
    return await window.scramjet.encodeUrl(url);
  } catch (e) {
    return null;
  }
}

</script>

</body>
</html>
